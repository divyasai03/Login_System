<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #43cea2, #185a9d);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .home-container {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0px 6px 15px rgba(0,0,0,0.25);
            text-align: center;
            width: 350px;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .welcome-message {
            font-size: 20px;
            font-weight: bold;
            color: #185a9d;
        }

        .logout-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 20px;
            background: #43cea2;
            color: white;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #2f8f7f;
        }
    </style>
</head>
<body>
    <div class="home-container">
        <h2>Home Page</h2>
        <p class="welcome-message">Welcome {{ profile_name }}</p>
        <a href="/logout" class="logout-btn">Logout</a>
    </div>
</body>
</html>
